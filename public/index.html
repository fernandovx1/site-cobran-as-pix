<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pix - Luana Menato</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #0047FF;
            --secondary: #00D1FF;
            --bg-dark: #0A0E17;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #0A0E17;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Background Animated Blobs */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a2a4a 0%, #0A0E17 100%);
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -10%; left: -10%; background: var(--primary); }
        .blob-2 { bottom: -10%; right: -10%; background: var(--secondary); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; background: #4f46e5; width: 200px; height: 200px; animation-duration: 15s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 30px;
            display: inline-block;
        }

        .logo {
            width: 320px;
            max-width: 90vw;
            height: auto;
            position: relative;
            z-index: 2;
            filter: contrast(1.3) brightness(1.1) drop-shadow(0 0 15px rgba(0, 71, 255, 0.3));
            animation: float 4s ease-in-out infinite, pulse-glow 3s ease-in-out infinite;
        }

        /* Borboletas Flutuantes Adicionais */
        .butterfly-extra {
            position: absolute;
            font-size: 20px;
            z-index: 3;
            pointer-events: none;
        }

        .b1 { top: -10px; left: -10px; animation: fly1 5s linear infinite; }
        .b2 { top: 20px; right: -10px; animation: fly2 6s linear infinite; }
        .b3 { bottom: -10px; left: 40%; animation: fly3 7s linear infinite; }

        @keyframes fly1 {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(-20px, -20px) rotate(-20deg); }
            80% { opacity: 1; }
            100% { transform: translate(-40px, -10px) rotate(0deg); opacity: 0; }
        }

        @keyframes fly2 {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(25px, -15px) rotate(20deg); }
            80% { opacity: 1; }
            100% { transform: translate(50px, 10px) rotate(0deg); opacity: 0; }
        }

        @keyframes fly3 {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(10px, 20px) scale(1.2); }
            80% { opacity: 1; }
            100% { transform: translate(0, 40px) scale(1); opacity: 0; }
        }

        /* Screen-wide Floating Butterflies */
        .butterfly-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-butterfly {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            filter: drop-shadow(0 0 10px rgba(0, 209, 255, 0.4));
            animation: cruise 15s linear infinite;
        }

        @keyframes cruise {
            0% { transform: translate(-10vw, 110vh) rotate(45deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(110vw, -10vh) rotate(45deg); opacity: 0; }
        }

        .fb-1 { animation-delay: 0s; animation-duration: 25s; left: 10%; }
        .fb-2 { animation-delay: 12s; animation-duration: 30s; left: 40%; transform: scale(0.8); }
        .fb-3 { animation-delay: 5s; animation-duration: 28s; left: 70%; transform: scale(1.2); }

        /* Foreground Butterflies (Passing in front) */
        .butterfly-fg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200; /* Above everything */
        }

        .fb-fg-1 { animation: cruise-fg 20s linear infinite; animation-delay: 8s; left: 20%; }
        .fb-fg-2 { animation: cruise-fg 22s linear infinite; animation-delay: 18s; left: 60%; transform: scale(0.7); }

        /* Floating Sunflowers */
        .sunflower-bg-element {
            position: absolute;
            font-size: 30px;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3));
            animation: drift 30s linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(-10vw, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translate(110vw, 110vh) rotate(360deg); opacity: 0; }
        }

        .sf-1 { animation-delay: 2s; animation-duration: 35s; left: 20%; font-size: 40px; }
        .sf-2 { animation-delay: 15s; animation-duration: 40s; left: 50%; font-size: 25px; }
        .sf-3 { animation-delay: 8s; animation-duration: 45s; left: 80%; font-size: 35px; }

        @keyframes cruise-fg {
            0% { transform: translate(-20vw, 120vh) rotate(30deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translate(120vw, -20vh) rotate(30deg) scale(1.5); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 71, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(0, 71, 255, 0.6)); }
        }



        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: rgba(204, 214, 246, 0.6);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(204, 214, 246, 0.5);
            margin-left: 5px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 71, 255, 0.15);
        }

        input:focus + .input-icon {
            color: var(--secondary);
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 71, 255, 0.3);
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn-generate::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-generate:hover::after {
            left: 100%;
        }

        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 71, 255, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0) scale(0.98);
        }

        #qr-container {
            display: none;
            margin-top: 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
        }

        #qr-code-img {
            width: 100%;
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .timer-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 71, 71, 0.1);
            color: #ff4747;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 71, 71, 0.2);
            backdrop-filter: blur(5px);
            animation: pulse-timer 2s infinite;
        }

        @keyframes pulse-timer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .copy-paste-group {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--glass-border);
            margin-top: 10px;
        }

        #pix-key-text {
            font-size: 0.7rem;
            color: #8892b0;
            word-break: break-all;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .btn-copy {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-copy:hover {
            background: var(--secondary);
        }

        .loading {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Admin Button */
        .btn-admin {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            z-index: 100;
        }

        .btn-admin:hover {
            color: var(--secondary);
            border-color: var(--secondary);
            background: rgba(0, 209, 255, 0.1);
            transform: rotate(90deg);
        }

        /* Stats Table */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ccd6f6;
        }

        .stats-table th {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--secondary);
        }

        .stats-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .status-pill {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        .status-approved { background: rgba(0, 255, 133, 0.1); color: #00ff85; }
        .status-pending { background: rgba(255, 184, 0, 0.1); color: #ffb800; }
        .status-rejected { background: rgba(255, 71, 71, 0.1); color: #ff4747; }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .logo {
                width: 250px;
            }
        }
    </style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="butterfly-bg">
    <span class="floating-butterfly fb-1">🦋</span>
    <span class="floating-butterfly fb-2">🦋</span>
    <span class="floating-butterfly fb-3">🦋</span>
</div>

<div class="butterfly-fg">
    <span class="floating-butterfly fb-fg-1">🦋</span>
    <span class="floating-butterfly fb-fg-2">🦋</span>
</div>

<div class="sunflower-bg">
    <span class="sunflower-bg-element sf-1">🌻</span>
    <span class="sunflower-bg-element sf-2">🌻</span>
    <span class="sunflower-bg-element sf-3">🌻</span>
</div>

<div class="container">
    <div class="logo-wrapper">
        <span class="butterfly-extra b1">🦋</span>
        <span class="butterfly-extra b2">🦋</span>
        <span class="butterfly-extra b3">🦋</span>
        <img src="logo.png?v=2" alt="Logo Luana Menato" class="logo">
    </div>

    <h1>Checkout Pix</h1>
    <p>Gere seu QR Code para pagamento instantâneo</p>

    <div id="setup-container">
        <div class="input-group">
            <label for="name">Nome do Cliente</label>
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <input type="text" id="name" placeholder="Ex: João Silva">
            </div>
        </div>

        <div class="input-group">
            <label for="product">Produto / Serviço</label>
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <input type="text" id="product" placeholder="Ex: Consultoria">
            </div>
        </div>

        <div class="input-group">
            <label for="amount">Valor (R$)</label>
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <input type="text" id="amount" placeholder="0,00" inputmode="decimal">
            </div>
        </div>

        <div class="input-group">
            <label for="email">E-mail para comprovante (opcional)</label>
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
        </div>

        <button class="btn-generate" onclick="generatePix()">Gerar Pix</button>
        <div class="loading" id="loader"></div>
    </div>

    <div id="qr-container">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="timer-badge">
                <span style="font-size: 1.2rem;">⏱️</span> Expira em: <span id="countdown">05:00</span>
            </div>
            <div class="qr-card">
                <img id="qr-code-img" src="" alt="QR Code Pix">
            </div>
        </div>
        
        <p style="margin-bottom: 10px;">Ou copie o código abaixo:</p>
        
        <div class="copy-paste-group">
            <span id="pix-key-text">Copiando código...</span>
            <button class="btn-copy" onclick="copyKey()">Copiar</button>
        </div>

        <button class="btn-generate" style="background: transparent; border: 1px solid var(--primary); margin-top: 20px;" onclick="reset()">Voltar</button>
    </div>
</div>

<div class="btn-admin" onclick="showAdminDashboard()" title="Painel Admin">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
</div>

<script>
    let currentPixKey = "";
    let countdownInterval;
    let statusInterval;

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        clearInterval(countdownInterval);
        countdownInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById('countdown').textContent = minutes + ":" + seconds;

            if (--timer < 0) {
                clearInterval(countdownInterval);
                Swal.fire({
                    icon: 'warning',
                    title: 'QR Code Expirado',
                    text: 'Este QR Code expirou. Por favor, gere um novo.',
                    background: '#1a2a4a',
                    color: '#fff'
                });
                reset();
            }
        }, 1000);
    }

    async function generatePix() {
        const name = document.getElementById('name').value;
        const product = document.getElementById('product').value;
        const amountRaw = document.getElementById('amount').value;
        const amount = amountRaw.replace(',', '.');
        const email = document.getElementById('email').value;

        if (!amount || amount <= 0) {
            Swal.fire({
                icon: 'error',
                title: 'Ops...',
                text: 'Por favor, insira um valor válido!',
                background: '#1a2a4a',
                color: '#fff',
                confirmButtonColor: '#0047FF'
            });
            return;
        }

        if (!name || !product) {
            Swal.fire({
                icon: 'warning',
                title: 'Campos obrigatórios',
                text: 'Por favor, preencha o Nome e o Produto.',
                background: '#1a2a4a',
                color: '#fff',
                confirmButtonColor: '#0047FF'
            });
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.querySelector('.btn-generate').style.display = 'none';

        try {
            const response = await fetch('/create-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, email, name, product })
            });

            const data = await response.json();

            if (data.qr_code_base64) {
                document.getElementById('qr-code-img').src = `data:image/png;base64,${data.qr_code_base64}`;
                document.getElementById('pix-key-text').innerText = data.qr_code;
                currentPixKey = data.qr_code;
                
                document.getElementById('setup-container').style.display = 'none';
                document.getElementById('qr-container').style.display = 'block';
                startTimer(300); // 5 minutos em segundos
                startPolling(data.id);
            } else if (data.status === 'rejected') {
                throw new Error(`Pagamento Rejeitado: ${data.status_detail || 'Verifique os dados e tente novamente.'}`);
            } else {
                throw new Error(data.error || 'Falha ao gerar QR Code');
            }
        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Erro',
                text: error.message || 'Não foi possível gerar o Pix. Tente novamente.',
                background: '#1a2a4a',
                color: '#fff'
            });
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.querySelector('.btn-generate').style.display = 'block';
        }
    }

    function startPolling(paymentId) {
        clearInterval(statusInterval);
        statusInterval = setInterval(async () => {
            try {
                const response = await fetch(`/check-payment/${paymentId}`);
                const data = await response.json();

                if (data.status === 'approved') {
                    clearInterval(statusInterval);
                    clearInterval(countdownInterval);
                    Swal.fire({
                        icon: 'success',
                        title: 'Pagamento Confirmado!',
                        text: 'Obrigado! Seu pagamento foi recebido com sucesso.',
                        background: '#1a2a4a',
                        color: '#fff',
                        confirmButtonColor: '#0047FF'
                    }).then(() => {
                        reset();
                    });
                }
            } catch (error) {
                console.error("Erro ao consultar status:", error);
            }
        }, 5000); // Verifica a cada 5 segundos
    }

    function copyKey() {
        navigator.clipboard.writeText(currentPixKey).then(() => {
            Swal.fire({
                icon: 'success',
                title: 'Copiado!',
                text: 'Código Pix copiado para a área de transferência.',
                timer: 2000,
                showConfirmButton: false,
                background: '#1a2a4a',
                color: '#fff'
            });
        });
    }

    async function showAdminDashboard() {
        Swal.fire({
            title: 'Carregando Painel...',
            background: '#1a2a4a',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const response = await fetch('/admin/stats');
            const data = await response.json();

            let historyHtml = `
                <div style="text-align: left; margin-bottom: 20px;">
                    <p style="margin: 0; color: #8892b0;">Total Aprovado (30 dias)</p>
                    <h2 style="color: #00ff85; font-size: 2rem; margin: 5px 0;">R$ ${data.total.toFixed(2)}</h2>
                    <p style="margin: 0; font-size: 0.8rem;">${data.count} pagamentos realizados</p>
                </div>
                <div style="max-height: 300px; overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.2);">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Cliente</th>
                                <th>Valor</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.history.map(p => `
                                <tr>
                                    <td>${new Date(p.date).toLocaleDateString('pt-BR')}</td>
                                    <td>${p.name.split(' ')[0]}</td>
                                    <td>R$ ${p.amount.toFixed(2)}</td>
                                    <td><span class="status-pill status-${p.status}">${p.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            Swal.fire({
                title: 'Painel de Controle',
                html: historyHtml,
                width: '600px',
                background: '#0A0E17',
                color: '#fff',
                showConfirmButton: true,
                confirmButtonText: 'Fechar',
                confirmButtonColor: '#0047FF',
                customClass: {
                    popup: 'glass-popup'
                }
            });

        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Erro',
                text: 'Não foi possível carregar as estatísticas.',
                background: '#1a2a4a',
                color: '#fff'
            });
        }
    }

    function reset() {
        document.getElementById('setup-container').style.display = 'block';
        document.getElementById('qr-container').style.display = 'none';
        document.getElementById('amount').value = '';
        document.getElementById('name').value = '';
        document.getElementById('product').value = '';
        document.getElementById('email').value = '';
        clearInterval(countdownInterval);
        clearInterval(statusInterval);
        document.getElementById('countdown').textContent = "05:00";
    }
</script>

</body>
</html>
