<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pix - Luana Menato</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #0047FF;
            --secondary: #00D1FF;
            --bg-dark: #0A0E17;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a2a4a, #0A0E17);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 30px;
            display: inline-block;
        }

        .logo {
            width: 220px;
            height: auto;
            position: relative;
            z-index: 2;
            filter: contrast(1.3) brightness(1.1) drop-shadow(0 0 15px rgba(0, 71, 255, 0.3));
            animation: float 4s ease-in-out infinite, pulse-glow 3s ease-in-out infinite;
        }

        /* Borboletas Flutuantes Adicionais */
        .butterfly-extra {
            position: absolute;
            font-size: 20px;
            z-index: 3;
            pointer-events: none;
        }

        .b1 { top: -10px; left: -10px; animation: fly1 5s linear infinite; }
        .b2 { top: 20px; right: -10px; animation: fly2 6s linear infinite; }
        .b3 { bottom: -10px; left: 40%; animation: fly3 7s linear infinite; }

        @keyframes fly1 {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(-20px, -20px) rotate(-20deg); }
            80% { opacity: 1; }
            100% { transform: translate(-40px, -10px) rotate(0deg); opacity: 0; }
        }

        @keyframes fly2 {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(25px, -15px) rotate(20deg); }
            80% { opacity: 1; }
            100% { transform: translate(50px, 10px) rotate(0deg); opacity: 0; }
        }

        @keyframes fly3 {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(10px, 20px) scale(1.2); }
            80% { opacity: 1; }
            100% { transform: translate(0, 40px) scale(1); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 71, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(0, 71, 255, 0.6)); }
        }

        /* Efeito de Brilho (Shine) no Logo */
        .logo-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: all 0.5s;
            z-index: 3;
            animation: shine 4s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; opacity: 0; }
            20% { left: 100%; opacity: 1; }
            40% { left: 100%; opacity: 0; }
            100% { left: 100%; opacity: 0; }
        }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #ccd6f6;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(0, 71, 255, 0.2);
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -10px rgba(0, 71, 255, 0.5);
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(0, 71, 255, 0.6);
            filter: brightness(1.1);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        #qr-container {
            display: none;
            margin-top: 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
        }

        #qr-code {
            width: 200px;
            height: 200px;
        }

        .copy-paste-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px dashed var(--glass-border);
        }

        #pix-key {
            font-size: 0.75rem;
            color: #8892b0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .btn-copy {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-copy:hover {
            background: var(--secondary);
        }

        .loading {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .logo {
                width: 210px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <span class="butterfly-extra b1">🦋</span>
        <span class="butterfly-extra b2">🦋</span>
        <span class="butterfly-extra b3">🦋</span>
        <img src="logo.png?v=2" alt="Logo Luana Menato" class="logo">
    </div>

    <h1>Checkout Pix</h1>
    <p>Gere seu QR Code para pagamento instantâneo</p>

    <div id="setup-container">
        <div class="input-group">
            <label for="name">Nome do Cliente</label>
            <input type="text" id="name" placeholder="Ex: João Silva">
        </div>

        <div class="input-group">
            <label for="product">Produto / Serviço</label>
            <input type="text" id="product" placeholder="Ex: Consultoria">
        </div>

        <div class="input-group">
            <label for="amount">Valor (R$)</label>
            <input type="text" id="amount" placeholder="0,00" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="email">E-mail para comprovante (opcional)</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <button class="btn-generate" onclick="generatePix()">Gerar Pix</button>
        <div class="loading" id="loader"></div>
    </div>

    <div id="qr-container">
        <div class="qr-card">
            <img id="qr-code-img" src="" alt="QR Code Pix">
        </div>
        
        <p style="margin-bottom: 10px;">Ou copie o código abaixo:</p>
        
        <div class="copy-paste-group">
            <span id="pix-key-text">Copiando código...</span>
            <button class="btn-copy" onclick="copyKey()">Copiar</button>
        </div>

        <button class="btn-generate" style="background: transparent; border: 1px solid var(--primary); margin-top: 20px;" onclick="reset()">Voltar</button>
    </div>
</div>

<script>
    let currentPixKey = "";

    async function generatePix() {
        const name = document.getElementById('name').value;
        const product = document.getElementById('product').value;
        const amountRaw = document.getElementById('amount').value;
        const amount = amountRaw.replace(',', '.');
        const email = document.getElementById('email').value;

        if (!amount || amount <= 0) {
            Swal.fire({
                icon: 'error',
                title: 'Ops...',
                text: 'Por favor, insira um valor válido!',
                background: '#1a2a4a',
                color: '#fff',
                confirmButtonColor: '#0047FF'
            });
            return;
        }

        if (!name || !product) {
            Swal.fire({
                icon: 'warning',
                title: 'Campos obrigatórios',
                text: 'Por favor, preencha o Nome e o Produto.',
                background: '#1a2a4a',
                color: '#fff',
                confirmButtonColor: '#0047FF'
            });
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.querySelector('.btn-generate').style.display = 'none';

        try {
            const response = await fetch('/create-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, email, name, product })
            });

            const data = await response.json();

            if (data.qr_code_base64) {
                document.getElementById('qr-code-img').src = `data:image/png;base64,${data.qr_code_base64}`;
                document.getElementById('pix-key-text').innerText = data.qr_code;
                currentPixKey = data.qr_code;
                
                document.getElementById('setup-container').style.display = 'none';
                document.getElementById('qr-container').style.display = 'block';
            } else {
                throw new Error('Falha ao gerar QR Code');
            }
        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Erro',
                text: 'Não foi possível gerar o Pix. Tente novamente.',
                background: '#1a2a4a',
                color: '#fff'
            });
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.querySelector('.btn-generate').style.display = 'block';
        }
    }

    function copyKey() {
        navigator.clipboard.writeText(currentPixKey).then(() => {
            Swal.fire({
                icon: 'success',
                title: 'Copiado!',
                text: 'Código Pix copiado para a área de transferência.',
                timer: 2000,
                showConfirmButton: false,
                background: '#1a2a4a',
                color: '#fff'
            });
        });
    }

    function reset() {
        document.getElementById('setup-container').style.display = 'block';
        document.getElementById('qr-container').style.display = 'none';
        document.getElementById('amount').value = '';
        document.getElementById('name').value = '';
        document.getElementById('product').value = '';
    }
</script>

</body>
</html>
